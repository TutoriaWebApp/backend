services:
    mysql-image:
        container_name: mysql_db
        image: mysql:8.0
        env_file: ./env/.env
        ports:
            - "${MYSQL_PORT}:3306"
        volumes:
            - db_data:/var/lib/mysql

    django-image:
        build:
            context: ./webapi-django
            dockerfile: Dockerfile
        container_name: django_api
        command: python manage.py runserver 0.0.0.0:8000
        volumes:
            - ./webapi-django:/app
        ports:
            - "8000:8000"
        depends_on:
            - mysql-image
        env_file: env/.env
        environment:
            DATABASE_HOST: 'mysql-image'
            DATABASE_PORT: '${MYSQL_PORT}'
            DATABASE_NAME: '${MYSQL_DATABASE}'
            DATABASE_USER: 'root'
            DATABASE_PASSWORD: '${MYSQL_ROOTPASSWORD}'

volumes:
    db_data:
